<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For My Love ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Floating Hearts -->
    <div id="hearts"></div>

    <!-- ==========================
            MAIN PAGE
    =========================== -->

    <div class="hero">

        <img src="images/DESIGN.png" class="picture" alt="Our Picture">

        <h1>I Love You, Love ❤️</h1>

        <p id="typing"></p>

        <button id="letterBtn">

            💌 Open My Letter

        </button>

    </div>

    <!-- ==========================
            ENVELOPE
    =========================== -->

    <div id="overlay">

        <div class="envelope">

            <!-- LETTER -->

            <div class="letter">

                <h2>To My Dearest Love ❤️</h2>

                <div class="heart-icon">❤️</div>

                <p>

                    Thank you for always making me smile.
                    <br><br>

                    Thank you for loving me despite my flaws.
                    <br><br>

                    You are my happiness.
                    <br>

                    You are my safe place.
                    <br><br>

                    I love you so much.
                    <br><br>

                    Forever and Always ❤️

                </p>

            </div>

            <!-- BACK -->

            <div class="back"></div>

            <!-- LEFT -->

            <div class="left"></div>

            <!-- RIGHT -->

            <div class="right"></div>

            <!-- BOTTOM -->

            <div class="bottom"></div>

            <!-- TOP FLAP -->

            <div class="flap"></div>

            <!-- WAX SEAL -->

            <div class="seal">

                ❤️

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
